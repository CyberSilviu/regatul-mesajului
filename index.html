<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Regatul Mesajului</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
    }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Use dvh (dynamic viewport height) so browser chrome is excluded */
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      position: fixed;
      inset: 0;
      /* Prevent scroll bounce and text selection on mobile */
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    canvas {
      display: block;
      touch-action: none;
      /* Prevent canvas from causing scroll on iOS */
      -webkit-touch-callout: none;
    }

    /* Portrait-mode warning — only on narrow touch screens */
    #rotate-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      color: #ffdd88;
      font-family: Georgia, serif;
      font-size: 22px;
      text-align: center;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 10000;
    }
    #rotate-msg span { font-size: 56px; }
    @media (orientation: portrait) and (pointer: coarse) {
      #rotate-msg { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-msg">
    <span>📱</span>
    Roteste telefonul in<br>modul <strong>landscape</strong> pentru a juca!
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
